<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSWIL – 3D Printed Parts Ordering</title>

<style>
body{font-family:Arial,sans-serif;padding:24px}

/* HEADER */
.header{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.company-name{font-size:30px;font-weight:bold}
.company-logo{height:60px;width:auto}

/* TABLE */
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #777;padding:8px;text-align:center}
th{background:#f2f2f2}

input[type="number"]{width:70px}
input[type="text"],select{padding:6px}

button{padding:6px 10px}
button:disabled{background:#ccc}

.stock-low{background:#f8d7da}
footer{margin-top:30px;font-size:12px;color:#555;text-align:center}
.status{font-weight:bold}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <span class="company-name">Motherson Sumi Wiring India Limited</span>
  <img src="./Logo.png" class="company-logo" alt="" onerror="this.style.display='none'">
</div>

<h3>3D Printed Parts – Live Ordering & SAP PR</h3>

<!-- REQUEST -->
<h3>Request Details</h3>
<label>Requester Employee ID:</label>
<input id="empId">

<label>Requesting Unit:</label>
<select id="reqUnit">
  <option value="">-- Select --</option>
  <option>P25</option><option>P26</option><option>P51</option>
  <option>P48</option><option>P49</option>
</select>

<label>Manufacturing Unit:</label>
<select id="mfgUnit">
  <option value="">-- Select --</option>
  <option value="P51|laxman.gutte@mswil.motherson.com">P51 – Laxman Gutte</option>
</select>

<!-- APPROVAL -->
<h3>Approval</h3>
<label><input type="checkbox" id="approvalCheck"> Main Approval Required</label>

<label>Main Approver:</label>
<select id="approver"></select>

<h3>P51 Approval Authority</h3>
<select id="p51Authority">
  <option value="">-- Select --</option>
  <option value="vijay.aggarwal@mswil.motherson.com|Vijay Aggarwal">Vijay Aggarwal</option>
</select>

<p><b>Status:</b> <span id="status" class="status">Draft</span></p>

<input id="search" placeholder="Search Material / Jig / Description" style="width:450px;padding:6px">

<table>
<thead>
<tr>
  <th>Material No</th>
  <th>Jig Code</th>
  <th>Description</th>
  <th>Unit ₹</th>
  <th>Stock</th>
  <th>Qty</th>
  <th>Total ₹</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<br>
<button onclick="exportPR()">✅ Export SAP PR</button>

<footer>© <span id="year"></span> – Developed by Laxman Gutte</footer>

<script>
const VALID_EMP_IDS=["5095","5271","S08457","S11306","S11412","5052","S11868","S10694","S09643"]
let products=[],cart=[]

fetch("products.json").then(r=>r.text()).then(t=>{
  t=t.replace(/^\uFEFF/,"")
  const raw=JSON.parse(t)

  products=raw.map(row=>{
    const n={}
    Object.keys(row).forEach(k=>n[k.trim()]=row[k])

    const price=parseFloat(String(n["Price"]||"").replace(/[^0-9.]/g,""))||0
    return{
      material:n["Material No"],
      jig:n["Jig Code"],
      desc:n["Description"],
      price:price,
      stock:Number(n["Done Qty"]||0)
    }
  })

  renderTable()
  updateApprovers()
})

reqUnit.onchange=updateApprovers
search.onkeyup=renderTable

function updateApprovers(){
  approver.innerHTML=""
  const u=reqUnit.value
  if(["P25","P48","P49","P51"].includes(u)){
    addApr("rakesh.ranjan@mswil.motherson.com","Rakesh Ranjan")
    addApr("nitin.hule@mswil.motherson.com","Nitin Hule")
  }
  if(u==="P26"){
    addApr("rakesh.ekhande@mswil.motherson.com","Rakesh Ekhande")
  }
}
function addApr(m,n){
  const o=document.createElement("option")
  o.value=m+"|"+n
  o.textContent=n
  approver.appendChild(o)
}

function renderTable(){
  const q=search.value.toLowerCase()
  rows.innerHTML=""

  products.forEach((p,i)=>{
    if(p.material.includes(q)||p.jig.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)){
      const disable=p.stock<=0||p.price<=0
      rows.innerHTML+=`
      <tr class="${p.stock<=0?'stock-low':''}">
        <td>${p.material}</td>
        <td>${p.jig}</td>
        <td>${p.desc}</td>
        <td>${p.price}</td>
        <td>${p.stock}</td>
        <td>
          <input type="number" min="1" value="1" id="qty${i}"
            onchange="updateTotal(${i})">
        </td>
        <td id="tot${i}">${p.price.toFixed(2)}</td>
        <td>
          <button ${disable?'disabled':''} onclick="addToCart(${i})">Add</button>
        </td>
      </tr>`
    }
  })
}

function updateTotal(i){
  const qty=Number(document.getElementById("qty"+i).value)
  const price=products[i].price
  document.getElementById("tot"+i).innerText=(qty*price).toFixed(2)
}

function addToCart(i){
  const qty=Number(document.getElementById("qty"+i).value)
  const p=products[i]
  if(qty>p.stock){alert("Qty exceeds stock");return}
  cart.push({...p,qty,total:qty*p.price})
  alert("Item added ✅")
}

function exportPR(){
  if(!approvalCheck.checked){alert("Approval required");return}
  if(!approver.value){alert("Select Main Approver");return}
  if(!VALID_EMP_IDS.includes(empId.value.trim())){alert("Invalid Employee ID");return}
  if(cart.length===0){alert("Cart empty");return}

  status.innerText="Pending Approval"
  status.style.color="orange"

  const pr="MSWIL-PR-"+Date.now()
  let csv="PR,Material,Jig,Description,Qty,Price,Total\n"
  cart.forEach(p=>csv+=[pr,p.material,p.jig,p.desc,p.qty,p.price,p.total].join(",")+"\n")

  const a=document.createElement("a")
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}))
  a.download=pr+".csv"
  a.click()
}

year.innerText=new Date().getFullYear()
</script>

</body>
</html>
``
