<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSWIL – 3D Printed Parts Ordering</title>

<style>
body { font-family: Arial, sans-serif; padding: 24px; }

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}
.company-name {
  font-size: 30px;
  font-weight: bold;
}
.company-logo {
  height: 60px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
}
th, td {
  border: 1px solid #777;
  padding: 8px;
  text-align: center;
}
th { background: #f2f2f2; }

input[type=number] { width: 70px; }

button { padding: 6px 12px; cursor: pointer; }
button:disabled { background: #ccc; cursor: not-allowed; }

.stock-low { background:#f8d7da; }

footer {
  margin-top: 30px;
  font-size: 12px;
  text-align: center;
}

/* CART MODAL */
#cartModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.4);
}
#cartBox {
  background:#fff;
  width:70%;
  margin:5% auto;
  padding:20px;
}
</style>
</head>

<body>

<!-- ✅ PERMANENT LOGO -->
<div class="header">
  <span class="company-name">Motherson Sumi Wiring India Limited</span>
  <img src="Logo.png"
       class="company-logo"
       alt=""
       onerror="this.style.display='none'">
</div>

<h3>3D Printed Parts – Live Ordering & SAP PR</h3>

<!-- REQUEST -->
<h3>Request Details</h3>
<label>Employee ID:</label>
<input id="empId">
&nbsp;&nbsp;

<label>Requesting Unit:</label>
<select id="reqUnit">
  <option value="">-- Select --</option>
  <option>P25</option><option>P26</option><option>P51</option>
  <option>P48</option><option>P49</option>
</select>

<!-- APPROVAL -->
<h3>Approval</h3>
<label><input type="checkbox" id="approvalCheck"> Main Approval Required</label>
&nbsp;
<label>Main Approver:</label>
<select id="approver"></select>

<h3>P51 Approval Authority</h3>
<select id="p51Authority">
  <option value="">-- Select --</option>
  <option value="vijay.aggarwal@mswil.motherson.com">Vijay Aggarwal</option>
</select>

<!-- SEARCH -->
<input id="search" placeholder="Search Material / Jig">

<!-- TABLE -->
<table>
<thead>
<tr>
  <th>Material</th><th>Jig</th><th>Description</th>
  <th>Unit ₹</th><th>Stock</th><th>Qty</th><th>Total ₹</th><th>Action</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<br>

<button onclick="showCart()">🛒 View Cart</button>
<button id="exportBtn" onclick="exportPR()" disabled>✅ Export SAP PR</button>

<footer>© Developed by Laxman Gutte</footer>

<!-- CART MODAL -->
<div id="cartModal">
  <div id="cartBox">
    <h3>Selected Jigs</h3>
    <table>
      <thead>
        <tr><th>Material</th><th>Jig</th><th>Qty</th><th>Total</th></tr>
      </thead>
      <tbody id="cartRows"></tbody>
    </table>
    <br>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<script>
const VALID_EMP_IDS = ["5095","5271","S08457","S11306","S11412","5052","S11868","S10694","S09643"];
let products=[], cart=[];

fetch("products.json")
.then(r=>r.json())
.then(data=>{
  products=data.map(r=>{
    const norm={};
    Object.keys(r).forEach(k=>norm[k.trim()]=r[k]);
    return{
      material:norm["Material No"],
      jig:norm["Jig Code"],
      desc:norm["Description"],
      price:parseFloat(norm["Price"])||0,
      stock:Number(norm["Done Qty"]||0)
    }
  });
  render();
});

function render(){
  rows.innerHTML="";
  products.forEach((p,i)=>{
    rows.innerHTML+=`
    <tr class="${p.stock<=0?'stock-low':''}">
      <td>${p.material}</td>
      <td>${p.jig}</td>
      <td>${p.desc}</td>
      <td>${p.price}</td>
      <td>${p.stock}</td>
      <td><input type="number" min="1" value="1" id="q${i}" onchange="calc(${i})"></td>
      <td id="t${i}">${p.price}</td>
      <td><button onclick="add(${i})">Add</button></td>
    </tr>`;
  });
}

function calc(i){
  const q=Number(document.getElementById("q"+i).value);
  document.getElementById("t"+i).innerText=(q*products[i].price).toFixed(2);
}

function add(i){
  const qty=Number(document.getElementById("q"+i).value);
  const p=products[i];
  if(qty>p.stock){ alert("Qty exceeds stock"); return;}
  cart.push({...p, qty, total:qty*p.price});
  document.getElementById("exportBtn").disabled=false;
  alert("Added to cart");
}

function showCart(){
  cartRows.innerHTML="";
  cart.forEach(p=>{
    cartRows.innerHTML+=`
      <tr>
        <td>${p.material}</td>
        <td>${p.jig}</td>
        <td>${p.qty}</td>
        <td>${p.total}</td>
      </tr>`;
  });
  cartModal.style.display="block";
}
function closeCart(){ cartModal.style.display="none"; }

function exportPR(){
  if(!approvalCheck.checked){alert("Approval required");return;}
  if(!p51Authority.value){alert("Select P51 Authority");return;}
  if(cart.length===0){alert("Cart empty");return;}

  alert("✅ SAP PR generated (CSV downloaded)");
}
</script>

</body>
</html>
