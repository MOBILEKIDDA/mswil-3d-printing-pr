<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSWIL JSON FINAL TEST</title>

<style>
body { font-family: Arial, sans-serif; padding: 24px; }

.header {
  display: flex;
  align-items: center;
  gap: 15px;
}

.company-name {
  font-size: 30px;
  font-weight: bold;
}

.company-logo {
  height: 60px;   /* CLEAR, BIG LOGO */
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}

th, td {
  border: 1px solid #555;
  padding: 6px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <span class="company-name">Motherson Sumi Wiring India Limited</span>
  <img src="Logo.png" class="company-logo" alt="Motherson Logo">
</div>

<h3>JSON Load Verification Page</h3>

<p id="status">Loading products.json…</p>

<table>
<thead>
<tr>
  <th>Material No</th>
  <th>Jig Code</th>
  <th>Description</th>
  <th>Price</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<script>
fetch("products.json")
  .then(res => {
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  })
  .then(data => {
    document.getElementById("status").innerText =
      "✅ Records loaded: " + data.length;

    const rows = document.getElementById("rows");

    data.slice(0, 20).forEach(r => {
      rows.innerHTML += `
        <tr>
          <td>${r["Material No"]}</td>
          <td>${r["Jig Code"]}</td>
          <td>${r["Description"]}</td>
          <td>${r["Price"]}</td>
        </tr>`;
    });
  })
  .catch(err => {
    document.getElementById("status").innerText =
      "❌ Failed to load products.json";
    console.error(err);
  });
</script>

</body>
</html>
